<!DOCTYPE html>
<html lang="ja">
<head> 
    <meta charset="UTF-8">
    <title>反則一覧 | ラグビーナビ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="pageHead">
        <h1>ラグビーの反則</h1>
    </header>

    <div id="pageBody">
        <main class="content-area">
            <h2>安全でより良いプレーのために</h2>
            <p>自分だけでなく、相手に危害を加える可能性があるため、よく反則一覧を確認し注意しましょう。</p>

            <div class="serch-box">
                <input type="text" placeholder="反則を検索">
                <button>🔍</button>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>反則名</th>
                        <th>内容、再開方法</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="name">ノックオン</td>
                        <td>ボールを前に落としてしまう反則。<br>相手ボールのスクラムで再開</td>
                    </tr>
                    <tr>
                        <td class="name">スローフォワード</td>
                        <td>自分より前にボールを投げてしまう反則。<br>相手ボールのスクラムで再開</td>
                    </tr>
                    <tr>
                        <td class="name">ノット・リリース・ザ・ボール</td>
                        <td>タックル"された"選手がボールを離さない反則。<br>相手ボールのスクラムで再開</td>
                    </tr>
                </tbody>
            </table>
        </main>

    </div>

</body>
</html>
