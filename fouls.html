<!DOCTYPE html>
<html lang="ja">
<head> 
    <meta charset="UTF-8">
    <title>反則解説 | ラグビーナビ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="pageHead">
        <h1>ラグビーの反則</h1>
    </header>

    <div id="pageBody">
        <main class="content-area">
            <h2>基本の「き」</h2>
            <p>危険なプレーは自分だけでなく、相手にも危害を加える可能性があるため、よく確認しましょう!</p>

            <div class="serch-box">
                <input type="text" placeholder="ルールを検索">
                <button>🔍</button>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>反則名</th>
                        <th>解説</th>
                        <th>危険度<br>💀～💀💀💀💀</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="name">ハイタックル</td>
                        <td>胸骨より上にタックルに入る危険なプレー。2025年よりルール改定</td>
                        <td>💀💀</td>
                    </tr>
                    <tr>
                        <td class="name">スピアタックル</td>
                        <td>タックルした相手を逆さに持ち上げ、頭や首から地面に落とす行為。</td>
                        <td>💀💀💀</td>
                    </tr>
                    <tr>
                        <td class="name">アイゴージング</td>
                        <td>相手の目を指で押したり抉る行為。ラグビーで最も悪質な反則の一つとされる。</td>
                        <td>💀💀💀💀 </td>
                    </tr>
                </tbody>
            </table>
        </main>

    </div>
