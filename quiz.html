<!DOCTYPE html>

    <title>クイズ | ラグビーナビ</title>

        <h1>ラグビークイズ 🏉</h1>

    <div id="pageBody">
        <main class="content-area">
            <div class="quiz-container">

                <div class="quiz-header">

                <div class="quiz-choices">
                    <button class="choice-btn" onclick="checkAnswer(11)">１１人</button>
                    <button class="choice-btn" onclick="checkAnswer(13)">１３人</button>
                    <button class="choice-btn" onclick="checkAnswer(15)">１５人</button>
                </div>

                <div id="result-message" class="result-area">
                </div>

            </div>
        </main>

        <aside class="sideNav">
            <h3>メニュー</h3>
