<!DOCTYPE html>
<html lang="ja">
<head> 
    <meta charset="UTF-8">
    <title>ルール解説 | ラグビーナビ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="pageHead">
        <h1>ラグビーのルール</h1>
    </header>

    <div id="pageBody">
        <main class="content-area">
            <h2>基本の「き」</h2>
            <p>ラグビーは、15人の仲間と共に、トライを目指すスポーツです。</p>

            <div class="serch-box">
                <input type="text" placeholder="ルールを検索">
                <button>🔍</button>
            </div>

            <table class="rule-table">
                <thead>
                    <tr>
                        <th>ルール名</th>
                        <th>ルール解説</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="rule-name">50-22</td>
                        <td>自陣50メートルラインより手前から蹴ったボールが、敵陣22メートルライン以降でバインドして外に出た場合、マイボールラインアウトで開始できる。</td>
                    </tr>
                    <tr>
                        <td class="rule-name">マーク</td>
                        <td>自陣22メートルエリア内で相手からのキックを捕る際「マーク！」と叫ぶと、その地点からフリーキックで再開できる</td>
                    </tr>
                    <tr>
                        <td class="rule-name">ゴールライン・ドロップアウト</td>
                        <td>守備側が自陣ゴール内でボールを置いた際、ゴールライン上からキックで再開できる。</td>
                    </tr>
                </tbody>
            </table>
        </main>

    </div>

</body>
</html>
