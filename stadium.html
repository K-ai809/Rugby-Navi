<!DOCTYPE　html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スタジアムガイド | ラグビーガイド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="pageHead">
        <h1>ラグビー場ガイド 🏟</h1>
    </header>

    <div id="pageBody">
        <nav class="sideNav">
            <ul>
                <li><a href="index.html">ホーム</a></li>
            </ul>
        </nav>

        <main class="content-area">
            <section class="stadium-section">
                <h2>主要スタジアム一覧</h2>
                <p>会場を選択すると、アクセスや周辺情報を確認できます。</p>

                <div class="stadium-grid">
                    <div class="stadium-card">
                        <div class="stadium-info">
                            <span class="area-tag">関東</span>
                            <h3>秩父宮ラグビー場</h3>
                            <p>「ラグビーの聖地」と呼ばれる東京のラグビー専用球場</p>
                            <button class="btn-detail">詳細・行き方を見る</button>
                        </div>
                    </div>

                    <div class="stadium-card">
                        <div class="stadium-info">
                            <span class="area-tag">関西</span>
                            <h3>花園ラグビー場</h3>
                            <p>日本初のラグビー専用スタジアム。高校ラグビーの聖地</p>
                            <button class="btn-detail">詳細・行き方を見る</button>
                        </div>
                    </div>

                    <div class="stadium-card">
                        <div class="stadium-info">
                            <span class="area-tag">東海</span>
                            <h3>パロマ瑞穂ラグビー場</h3>
                            <p>愛知県名古屋市にある、歴史深いスタジアム</p>
                            <button class="btn-detail">詳細・行き方を見る</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
